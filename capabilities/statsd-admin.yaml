naftiko: 1.0.0-alpha2
info:
  label: StatsD Admin Interface
  description: >-
    StatsD Admin Interface — Naftiko capability covering the daemon's
    plain-text management TCP interface (default port 8126). Inspect counters,
    gauges, and timers, dump configuration, toggle health status, and delete
    in-memory aggregates by name or wildcard.
  tags:
  - StatsD
  - Admin
  - Management
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    STATSD_HOST: STATSD_HOST
    STATSD_MGMT_PORT: STATSD_MGMT_PORT
capability:
  consumes:
  - type: http
    namespace: statsd-admin
    baseUri: http://{host}:{port}
    description: StatsD admin interface — modeled as HTTP for tooling purposes.
    resources:
    - name: stats
      path: /stats
      operations:
      - name: getStats
        method: GET
        description: StatsD Get Server Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: counters
      path: /counters
      operations:
      - name: listCounters
        method: GET
        description: StatsD List All Counters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gauges
      path: /gauges
      operations:
      - name: listGauges
        method: GET
        description: StatsD List All Gauges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: timers
      path: /timers
      operations:
      - name: listTimers
        method: GET
        description: StatsD List All Timers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: delcounters
      path: /delcounters
      operations:
      - name: deleteCounters
        method: POST
        description: StatsD Delete Counters
        outputRawFormat: text
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body containing a `patterns` array of bucket name patterns.
          required: true
    - name: delgauges
      path: /delgauges
      operations:
      - name: deleteGauges
        method: POST
        description: StatsD Delete Gauges
        outputRawFormat: text
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: deltimers
      path: /deltimers
      operations:
      - name: deleteTimers
        method: POST
        description: StatsD Delete Timers
        outputRawFormat: text
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: health
      path: /health
      operations:
      - name: getHealth
        method: GET
        description: StatsD Get Health Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setHealth
        method: POST
        description: StatsD Set Health Status
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body containing `status` ("up" or "down").
          required: true
    - name: config
      path: /config
      operations:
      - name: dumpConfig
        method: GET
        description: StatsD Dump Current Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: statsd-admin-rest
    port: 8080
    description: REST adapter for the StatsD admin interface.
    resources:
    - path: /v1/stats
      name: stats
      description: REST surface for the `stats` admin command.
      operations:
      - method: GET
        name: getStats
        description: StatsD Get Server Stats
        call: statsd-admin.getStats
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/counters
      name: counters
      operations:
      - method: GET
        name: listCounters
        description: StatsD List All Counters
        call: statsd-admin.listCounters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gauges
      name: gauges
      operations:
      - method: GET
        name: listGauges
        description: StatsD List All Gauges
        call: statsd-admin.listGauges
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/timers
      name: timers
      operations:
      - method: GET
        name: listTimers
        description: StatsD List All Timers
        call: statsd-admin.listTimers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/delcounters
      name: delcounters
      operations:
      - method: POST
        name: deleteCounters
        description: StatsD Delete Counters
        call: statsd-admin.deleteCounters
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/delgauges
      name: delgauges
      operations:
      - method: POST
        name: deleteGauges
        description: StatsD Delete Gauges
        call: statsd-admin.deleteGauges
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deltimers
      name: deltimers
      operations:
      - method: POST
        name: deleteTimers
        description: StatsD Delete Timers
        call: statsd-admin.deleteTimers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/health
      name: health
      operations:
      - method: GET
        name: getHealth
        description: StatsD Get Health Status
        call: statsd-admin.getHealth
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: setHealth
        description: StatsD Set Health Status
        call: statsd-admin.setHealth
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/config
      name: config
      operations:
      - method: GET
        name: dumpConfig
        description: StatsD Dump Current Configuration
        call: statsd-admin.dumpConfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: statsd-admin-mcp
    port: 9090
    transport: http
    description: MCP adapter for the StatsD admin interface.
    tools:
    - name: statsd-get-server-stats
      description: StatsD Get Server Stats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: statsd-admin.getStats
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-list-counters
      description: StatsD List All Counters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: statsd-admin.listCounters
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-list-gauges
      description: StatsD List All Gauges
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: statsd-admin.listGauges
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-list-timers
      description: StatsD List All Timers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: statsd-admin.listTimers
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-delete-counters
      description: StatsD Delete Counters
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: statsd-admin.deleteCounters
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-delete-gauges
      description: StatsD Delete Gauges
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: statsd-admin.deleteGauges
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-delete-timers
      description: StatsD Delete Timers
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: statsd-admin.deleteTimers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-get-health-status
      description: StatsD Get Health Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: statsd-admin.getHealth
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-set-health-status
      description: StatsD Set Health Status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: statsd-admin.setHealth
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: statsd-dump-current-configuration
      description: StatsD Dump Current Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: statsd-admin.dumpConfig
      outputParameters:
      - type: object
        mapping: $.
